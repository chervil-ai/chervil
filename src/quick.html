<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
  <title>Quick ask</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px;
      padding: 0 18px;
      height: 64px;
      background: rgba(17, 20, 28, 0.96);
      border: 1px solid #2a3142;
      border-radius: 16px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
      -webkit-app-region: drag;
    }
    #leaf { font-size: 20px; -webkit-app-region: no-drag; }
    #q {
      -webkit-app-region: no-drag;
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e6e6e6;
      font-size: 17px;
    }
    #q::placeholder { color: #7c8595; }
    #hint {
      -webkit-app-region: no-drag;
      color: #7c8595;
      font-size: 11px;
      white-space: nowrap;
      border: 1px solid #2a3142;
      border-radius: 6px;
      padding: 2px 6px;
    }
    #close {
      -webkit-app-region: no-drag;
      flex: none;
      background: transparent;
      border: none;
      color: #7c8595;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
    }
    #close:hover { color: #e6e6e6; background: rgba(255, 255, 255, 0.08); }
  </style>
</head>
<body>
  <div id="bar">
    <span id="leaf">🌿</span>
    <input id="q" type="text" placeholder="Hey Sprig, ask…" autocomplete="off" spellcheck="false" />
    <span id="hint">↵ send · Esc to close</span>
    <button id="close" title="Close (Esc)" aria-label="Close">✕</button>
  </div>
  <script>
    const q = document.getElementById('q');
    const closeBtn = document.getElementById('close');
    if (closeBtn) closeBtn.addEventListener('click', () => { if (window.quick) window.quick.hide(); });
    function focusInput() { try { q.focus(); q.select(); } catch (e) {} }
    // Refocus + clear each time the bar is summoned.
    if (window.quick && window.quick.onShow) window.quick.onShow(() => { q.value = ''; setTimeout(focusInput, 30); });
    focusInput();
    q.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const v = q.value.trim();
        if (v && window.quick) { window.quick.submit(v); q.value = ''; }
      } else if (e.key === 'Escape') {
        if (window.quick) window.quick.hide();
      }
    });
  </script>
</body>
</html>
