<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 280px; margin: 0; padding: 14px; font: 14px system-ui, -apple-system, Segoe UI, sans-serif; background: #0b0d12; color: #e6e6e6; }
    h1 { font-size: 15px; margin: 0 0 12px; display: flex; gap: 6px; align-items: center; }
    input { width: 100%; box-sizing: border-box; background: #11141b; border: 1px solid rgba(255,255,255,.1); color: #e6e6e6; border-radius: 8px; padding: 9px; margin-bottom: 8px; }
    button { width: 100%; border: 0; border-radius: 8px; padding: 9px; font: inherit; font-weight: 600; cursor: pointer; }
    .primary { background: #7be0a3; color: #0b0d12; }
    .ghost { background: transparent; border: 1px solid rgba(255,255,255,.15); color: #e6e6e6; }
    .or { text-align: center; color: #7c8595; font-size: 11px; margin: 10px 0; }
    .sub { font-size: 12px; color: #9aa3b2; margin: 12px 0 0; text-align: center; }
    a { color: #7be0a3; }
  </style>
</head>
<body>
  <h1>🌿 Ask Sprig</h1>
  <input id="q" placeholder="Ask something about this page…" />
  <button id="askq" class="primary">Ask Sprig</button>
  <div class="or">or</div>
  <button id="askpage" class="ghost">Summarize this page</button>
  <p class="sub">No Chervil yet? <a id="get" href="#" target="_blank">Get the app →</a></p>
  <script src="popup.js"></script>
</body>
</html>
